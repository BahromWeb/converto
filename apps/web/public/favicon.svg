<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="convertpdfgo">
  <!-- Outer rounded square — signal-orange brand colour -->
  <rect width="64" height="64" rx="14" fill="#E35323"/>
  <!-- Inner mark — paper-cream square -->
  <rect x="20" y="20" width="24" height="24" rx="4" fill="#FAF6EE"/>
  <!-- Top-right notification dot — near-black ink -->
  <circle cx="50" cy="14" r="6" fill="#0F0E0C"/>
</svg>
